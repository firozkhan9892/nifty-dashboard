<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Trading System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #030712; 
            color: white; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: bgRotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #f87171;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(30, 41, 59, 0.6);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
        }

        .section-title span {
            font-size: 1.2rem;
        }

        /* Trading Cards */
        .trading-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stock-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .stock-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stock-card:hover::before { opacity: 1; }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .stock-name { font-weight: 600; font-size: 1rem; color: #cbd5e1; }
        .stock-price { font-size: 1.8rem; font-weight: 800; margin: 10px 0; }
        
        .badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .bg-green { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
        .bg-red { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .bg-yellow { background: rgba(234, 179, 8, 0.15); color: #facc15; }

        .stock-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item h4 { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
        .stat-item p { font-size: 0.9rem; font-weight: 600; margin-top: 2px; }

        /* Orders Section */
        .order-item {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #8b5cf6;
            padding: 15px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 12px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .order-value {
            font-weight: 700;
            color: #a78bfa;
            background: rgba(139, 92, 246, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .order-stocks {
            margin-top: 8px;
            display: flex;
            gap: 6px;
        }

        .stock-tag {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* News Section */
        .news-feed {
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #334155 transparent;
        }

        .news-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
            cursor: pointer;
            border-radius: 8px;
        }

        .news-item:hover { background: rgba(255,255,255,0.02); }

        .news-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }

        .news-category {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
        }

        .news-title { font-size: 0.95rem; font-weight: 500; line-height: 1.4; color: #e2e8f0; }
        .news-desc { font-size: 0.8rem; color: #64748b; margin-top: 5px; line-height: 1.4; }
        .news-footer { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.75rem; color: #475569; }

        /* Loading State */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            height: 60px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* News Filter Tabs */
        .news-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .filter-btn {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            border-color: rgba(139, 92, 246, 0.3);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            .trading-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 640px) {
            .trading-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; text-align: center; }
            .news-filters { gap: 5px; }
            .filter-btn { padding: 3px 8px; font-size: 0.65rem; }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h1>AI Trading Terminal</h1>
            </div>
            <div class="live-badge">
                <div class="dot"></div>
                LIVE UPDATES
            </div>
        </header>

        <div class="main-grid">
            <!-- Left Column: Signals & Orders -->
            <div style="display: flex; flex-direction: column; gap: 25px;">
                
                <!-- Trading Signals -->
                <div class="glass-card">
                    <div class="section-title"><span>📊</span> AI Trading Signals</div>
                    <div class="trading-grid" id="signals-container">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <!-- Latest Orders -->
                <div class="glass-card" style="flex: 1;">
                    <div class="section-title"><span>📦</span> Latest Corporate Orders</div>
                    <div id="orders-container">
                        <div class="skeleton"></div><div class="skeleton"></div>
                        <div style="text-align:center; color:#475569; font-size:0.85rem; margin-top:10px;">Scanning orders...</div>
                    </div>
                </div>

            </div>

            <!-- Right Column: Live News -->
            <div class="glass-card">
                <div class="section-title"><span>📰</span> Live Market News</div>
                <div class="news-filters" id="news-filters">
                    <button class="filter-btn active" onclick="filterNews('all', this)">All</button>
                    <button class="filter-btn" onclick="filterNews('earnings', this)">📊 Earnings</button>
                    <button class="filter-btn" onclick="filterNews('fo', this)">📈 F&O</button>
                    <button class="filter-btn" onclick="filterNews('rbi', this)">🏦 RBI</button>
                    <button class="filter-btn" onclick="filterNews('ev', this)">⚡️ EV</button>
                    <button class="filter-btn" onclick="filterNews('global', this)">🌐 Global</button>
                    <button class="filter-btn" onclick="filterNews('geo', this)">🌍 Geo</button>
                </div>
                <div class="news-feed" id="news-container">
                    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fetch Trading Signals
        async function loadSignals() {
            try {
                const res = await fetch('/api/signals');
                const data = await res.json();
                const container = document.getElementById('signals-container');
                
                container.innerHTML = data.map(s => {
                    if(s.error) return `<div class="stock-card"><p style="color:#f87171">Error: ${s.error}</p></div>`;
                    
                    let signalClass = 'bg-yellow';
                    if(s.signal.includes('BUY')) signalClass = 'bg-green';
                    if(s.signal.includes('SELL')) signalClass = 'bg-red';

                    const pred1 = s.predictions ? s.predictions[1] : s.prediction || 0;
                    const change1 = s.changes ? s.changes[1] : s.change || 0;
                    const confidence = s.confidences ? Math.round(s.confidences[1]) : 0;
                    const sentiment = s.sentiment || 0;

                    let priceColor = '#ffffff';
                    if(change1 > 0) priceColor = '#4ade80';
                    if(change1 < 0) priceColor = '#f87171';

                    return `
                    <div class="stock-card">
                        <div class="stock-header">
                            <span class="stock-name">${s.name}</span>
                            <span class="badge ${signalClass}">${s.signal}</span>
                        </div>
                        <div class="stock-price" style="color:${priceColor}">₹${s.price}</div>
                        <div style="font-size:0.8rem; color:#94a3b8;">1D: ₹${pred1} (${change1 > 0 ? '+' : ''}${change1}%)</div>
                        
                        <div style="display:flex; gap:15px; margin-top:8px; font-size:0.75rem;">
                            <span style="color:#a78bfa;">3D: ₹${s.predictions ? s.predictions[3] : '-'} (${s.changes ? (s.changes[3] > 0 ? '+' : '') + s.changes[3] : '-'}%)</span>
                            <span style="color:#f472b6;">7D: ₹${s.predictions ? s.predictions[7] : '-'} (${s.changes ? (s.changes[7] > 0 ? '+' : '') + s.changes[7] : '-'}%)</span>
                        </div>
                        
                        ${s.breakout ? `<div style="margin-top:8px; font-size:0.8rem; color:#c084fc; font-weight:600;">${s.breakout}</div>` : ''}
                        
                        <div class="stock-stats">
                            <div class="stat-item">
                                <h4>Support</h4>
                                <p style="color:#4ade80">₹${s.support}</p>
                            </div>
                            <div class="stat-item" style="text-align:center;">
                                <h4>Confidence</h4>
                                <p style="color:#a78bfa">${confidence}%</p>
                            </div>
                            <div class="stat-item" style="text-align:right;">
                                <h4>Resistance</h4>
                                <p style="color:#f87171">₹${s.resistance}</p>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                console.error("Signals Error:", e);
                document.getElementById('signals-container').innerHTML = `<div style="color:#f87171; padding:20px;">Error loading signals. Check API.</div>`;
            }
        }

        // Fetch Latest Orders
        async function loadOrders() {
            try {
                const res = await fetch('/api/orders');
                const data = await res.json();
                const container = document.getElementById('orders-container');
                
                if(!data || data.length === 0) {
                    container.innerHTML = `<div style="text-align:center; color:#64748b; padding:20px;">
                        <div style="font-size:2rem; margin-bottom:10px;">📦</div>
                        No new corporate orders detected right now.
                    </div>`;
                    return;
                }

                container.innerHTML = data.map(o => `
                    <div class="order-item">
                        <div class="order-header">
                            <div class="order-value">💰 ${o.value}</div>
                            <div style="font-size:0.8rem; color:${String(o.sentiment).includes('Positive') ? '#4ade80' : '#f87171'}">${o.sentiment}</div>
                        </div>
                        <div style="font-size:0.9rem; font-weight:500; color:#e2e8f0;">${o.title}</div>
                        <div class="order-stocks">
                            ${o.stocks && o.stocks.length > 0 ? o.stocks.map(s => `<span class="stock-tag">${s}</span>`).join('') : '<span class="stock-tag" style="background:rgba(100,116,139,0.2); color:#94a3b8">General</span>'}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Orders Error:", e);
            }
        }

        // Store all news data globally for filtering
        let allNewsData = [];

        // Fetch Live News
        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                const data = await res.json();
                allNewsData = data;
                renderNews(allNewsData);
            } catch (e) {
                console.error("News Error:", e);
                document.getElementById('news-container').innerHTML = `<div style="color:#f87171; padding:20px;">Error loading news.</div>`;
            }
        }

        function renderNews(data) {
            const container = document.getElementById('news-container');
            
            if(!data || data.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#64748b; padding:20px;">No news available.</div>`;
                return;
            }
            
            container.innerHTML = data.map(n => {
                const sentimentColor = String(n.sentiment).includes('Positive') ? '#4ade80' : String(n.sentiment).includes('Negative') ? '#f87171' : '#facc15';
                return `
                <div class="news-item" onclick="window.open('${n.url}', '_blank')">
                    <div class="news-meta">
                        <span class="news-category">${n.category}</span>
                        <span style="color:${sentimentColor}; font-weight:600">${n.sentiment}</span>
                    </div>
                    <div class="news-title">${n.title}</div>
                    <div class="news-desc">${n.desc}</div>
                    <div class="news-footer">
                        <span>${n.source}</span>
                        <span>${n.stocks && n.stocks.length > 0 ? '🔍 ' + n.stocks.join(', ') : ''}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // Filter News by Category
        async function filterNews(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (category === 'all') {
                if (allNewsData.length === 0) {
                    await loadNews();
                } else {
                    renderNews(allNewsData);
                }
            } else {
                try {
                    const res = await fetch(`/api/news/${category}`);
                    const data = await res.json();
                    renderNews(data);
                } catch (e) {
                    console.error("Filter Error:", e);
                }
            }
        }

        // Initial Load
        loadSignals();
        loadOrders();
        loadNews();

        // Auto Refresh (60 seconds for News/Orders, 30 for Signals)
        setInterval(loadSignals, 30000);
        setInterval(() => {
            loadOrders();
            loadNews();
        }, 60000);

    </script>
</body>
</html>
